# =====================================================================
# Valcoin shop catalog — reference (ecosystem-aware, balance-guarded)
# =====================================================================
# Drop-in replacement for BepInEx/config/valcoin_shop.yaml. This IS the shipped
# default catalog (see Catalog.cs). All fields/effects below are fully
# understood by the plugin and backend:
#
# Fields (Catalog.Sku + parser cases in Catalog.cs):
#   name:          label shown in the Shop tab
#   description:   (optional) short tag after the name, e.g. "Best value"
#   price:         Valcoin cost
#   effect:        grant_item | add_charges | grant_perk
#   item:          comma list of "prefab" or "prefab:qty" (grant_item effect)
#   weekly_cap:    max purchases of this SKU per player per week (0 = unlimited)
#   requires_boss: global boss key that must be set before this SKU is buyable
#                  (defeated_bonemass | defeated_goblinking | defeated_queen |
#                   defeated_fader | defeated_gdking | defeated_dragon | ...)
#   perk:          (add_charges) the charge-pool key; (grant_perk) the perk id
#   charges:       (add_charges) how many charges each purchase grants
#   category:      Shop grouping label — SKUs sharing it render under one header
#   category_desc: one-line blurb for the category, set ONCE on the first SKU of
#                  the group. The Shop tab auto-derives a "contents" line for
#                  grant_item SKUs from `item`, so per-item prose isn't needed.
#   preview_image: (optional) thumbnail shown next to the SKU in the Shop tab and
#                  in the purchase-confirm dialog. Either an https URL, or a path
#                  relative to BepInEx/config (e.g. shop_images/foo.png). Prefer a
#                  URL on a dedicated server so every client can load it — a
#                  config-relative path only resolves where the file exists.
#
# Effects:
#   grant_item     spawns the listed item stacks at the buyer's feet
#   add_charges    credits a backend-tracked consumable pool (e.g. Soulkeeper)
#
# grant_item pre-checks the boss gate + weekly cap BEFORE debiting coins,
# but prefab validity is only checked at spawn time — a wrong prefab id
# charges coins and skips that item. Verify any id you add against your
# Valheim version. Category + item order follow first appearance in this file.
# =====================================================================

shop:

  # ---------- Soulkeeper Charms (death insurance) ----------
  # Charges of one shared 'soulkeeper' pool. On death you keep your skills (no
  # skill drain) and a Valkyrie carries you back to your tombstone. Never helps
  # you win a fight - it only softens the death tax. Priced with a deliberate
  # decoy: the x5 exists to make x10 the obvious buy.
  soulkeeper_1:
    category: "Soulkeeper Charms"
    category_desc: "Death insurance - keep your skills on death (no drain) and a Valkyrie carries you back to your tombstone, scattering nearby creatures on arrival. Limited to 10 charges per week. PvE-safe; never helps you win a fight."
    name: "Soulkeeper Charm (x1)"
    price: 300
    effect: add_charges
    perk: soulkeeper
    charges: 1
    weekly_charge_cap: 10
    # preview_image: "https://your-app.fly.dev/static/shop/soulkeeper.png"
    # (or a config-relative path, e.g. preview_image: "shop_images/soulkeeper.png")

  soulkeeper_5:
    category: "Soulkeeper Charms"
    name: "Soulkeeper Charm (x5)"
    price: 1200
    effect: add_charges
    perk: soulkeeper
    charges: 5
    weekly_charge_cap: 10

  soulkeeper_10:
    category: "Soulkeeper Charms"
    name: "Soulkeeper Charm (x10)"
    description: "Best value"
    price: 1300
    effect: add_charges
    perk: soulkeeper
    charges: 10
    weekly_charge_cap: 10

  # ---------- Familiars (mini flying-creature companions) ----------
  # armor_vfx binds a miniature flying creature to your equipped helmet - it
  # hovers at your right shoulder, head height. Purely cosmetic - no stats.
  # `perk` selects the familiar; the visuals live in the plugin's ArmorVfx
  # registry. Priced by progression tier.
  familiar_bat:
    category: "Familiars"
    category_desc: "A miniature flying creature hovers at your shoulder, bound to your equipped helmet (renames it to match). Grants feather fall and a small attack bonus. Other players see it too."
    name: "Bat Familiar"
    description: "+2 slash"
    price: 400
    effect: armor_vfx
    perk: bat

  familiar_ghost:
    category: "Familiars"
    name: "Ghost Familiar"
    description: "+2 slash"
    price: 500
    effect: armor_vfx
    perk: ghostlight

  familiar_deathsquito:
    category: "Familiars"
    name: "Deathsquito Familiar"
    description: "+2 pierce"
    price: 600
    effect: armor_vfx
    perk: deathsquito

  familiar_hatchling:
    category: "Familiars"
    name: "Drake Hatchling Familiar"
    description: "+2 frost"
    price: 700
    effect: armor_vfx
    perk: hatchling

  familiar_wraith:
    category: "Familiars"
    name: "Wraith Familiar"
    description: "+2 slash"
    price: 800
    effect: armor_vfx
    perk: wraith

  familiar_volture:
    category: "Familiars"
    name: "Volture Familiar"
    description: "+3 pierce"
    price: 900
    effect: armor_vfx
    perk: volture

  familiar_gjall:
