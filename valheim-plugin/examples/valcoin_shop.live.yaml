    description: "+2 frost"
    price: 700
    effect: armor_vfx
    perk: hatchling

  familiar_wraith:
    category: "Familiars"
    name: "Wraith Familiar"
    description: "+2 slash"
    price: 800
    effect: armor_vfx
    perk: wraith

  familiar_volture:
    category: "Familiars"
    name: "Volture Familiar"
    description: "+3 pierce"
    price: 900
    effect: armor_vfx
